name: Summarize new issues

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

concurrency:
  group: issue-summary-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Post structured issue summary
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const rawBody = issue.body || "(no description provided)";
            const normalizedBody = rawBody
              .replace(/\r\n/g, "\n")
              .split("\n")
              .map((line) => line.trim())
              .filter(Boolean)
              .slice(0, 6)
              .join("\n- ");

            const summary = [
              "🤖 Automated triage summary",
              "",
              `- **Title:** ${issue.title}`,
              `- **Author:** @${issue.user.login}`,
              `- **URL:** ${issue.html_url}`,
              `- **Key points:**\n- ${normalizedBody}`,
              "",
              "Please confirm labels/priority before implementation.",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: summary,
            });
